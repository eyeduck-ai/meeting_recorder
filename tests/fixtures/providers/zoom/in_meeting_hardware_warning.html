<!doctype html>
<html lang="en">
  <head>
    <title>Zoom Meeting</title>
  </head>
  <body>
    <main class="meeting-app">
      <div id="wc-footer">Meeting controls</div>
      <section class="shared-content">Presentation is visible behind the toast.</section>
      <div class="zm-notification" role="alert">
        <span>
          For a better meeting experience, enable the option 'Use graphics/hardware acceleration'
          under browser system settings.
        </span>
        <button aria-label="close">×</button>
      </div>
    </main>
  </body>
</html>
