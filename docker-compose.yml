# Docker Compose - Base Configuration
# 共用設定，開發與生產皆使用此檔案

name: ${COMPOSE_PROJECT_NAME:-meeting-recorder-dev}

services:
  app:
    image: ${MEETING_RECORDER_IMAGE:-ghcr.io/eyeduck-ai/meeting_recorder:latest}
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${VNC_PORT:-5900}:5900"
    volumes:
      - ./recordings:/app/recordings
      - ./diagnostics:/app/diagnostics
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
    privileged: true
    shm_size: '2gb'
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # DNS configuration for resilience against transient DNS failures
    dns:
      - 8.8.8.8 # Google Primary DNS
      - 8.8.4.4 # Google Secondary DNS
      - 1.1.1.1 # Cloudflare DNS
