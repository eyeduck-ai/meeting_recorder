name: Nightly Smoke

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build and start app
        run: docker compose up --build -d

      - name: Wait for health readiness
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          deadline = time.time() + 180
          last_payload = None
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5) as response:
                      payload = json.load(response)
                      last_payload = payload
                      if payload.get("recording_runtime", {}).get("ready"):
                          with open("nightly-smoke-health.json", "w", encoding="utf-8") as fh:
                              json.dump(payload, fh, indent=2, ensure_ascii=False)
                          raise SystemExit(0)
              except Exception:
                  time.sleep(3)
              else:
                  time.sleep(3)

          if last_payload is not None:
              with open("nightly-smoke-health.json", "w", encoding="utf-8") as fh:
                  json.dump(last_payload, fh, indent=2, ensure_ascii=False)
          raise SystemExit("recording runtime did not become ready within 180s")
          PY

      - name: Run deterministic recording smoke
        run: |
          docker exec meeting-recorder \
            python -m scripts.smoke_recording \
            --duration-sec 8 \
            --output-dir /app/recordings/smoke \
            --diagnostics-dir /app/diagnostics/smoke

      - name: Capture container logs
        if: always()
        run: docker logs meeting-recorder > nightly-smoke-container.log 2>&1 || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-smoke-artifacts
          if-no-files-found: warn
          path: |
            nightly-smoke-health.json
            nightly-smoke-container.log
            diagnostics/smoke
            recordings/smoke

      - name: Tear down
        if: always()
        run: docker compose down -v
